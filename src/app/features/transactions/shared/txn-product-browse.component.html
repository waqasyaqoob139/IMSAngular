<div class="product-browse" #browseOverlay *ngIf="open" (keydown)="onPanelKeydown($event)">
  <div class="product-browse__backdrop" (click)="close()"></div>
  <div
    class="product-browse__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="product-browse-title"
    (click)="$event.stopPropagation()">
    <div class="product-browse__head">
      <h6 id="product-browse-title" class="product-browse__title">Browse products</h6>
      <button type="button" class="product-browse__close" (click)="close()" aria-label="Close">×</button>
    </div>

    <div class="product-browse__search">
      <input
        #browseSearchInput
        class="form-control form-control-sm"
        [placeholder]="searchPlaceholder"
        [(ngModel)]="filter"
        (input)="onFilterInput()"
        (keydown)="onKeydown($event)"
        autocomplete="off" />
    </div>

    <div class="product-browse__list" role="listbox">
      <div class="product-browse__cols" aria-hidden="true">
        <span>Product</span>
        <span>Serial / SKU</span>
        <span>Stock</span>
        <span>{{ priceLabel }}</span>
      </div>
      <div *ngIf="loading" class="product-browse__empty">
        Searching…
      </div>
      <div *ngIf="!loading && filteredProducts.length === 0" class="product-browse__empty">
        No products match your search.
      </div>
      <button
        type="button"
        *ngFor="let p of filteredProducts; let i = index"
        class="product-browse__row"
        [class.product-browse__row--active]="i === highlightedIndex"
        role="option"
        [attr.aria-selected]="i === highlightedIndex"
        (click)="pick(p)"
        (mouseenter)="highlightedIndex = i">
        <span class="product-browse__name">{{ p.productName }}</span>
        <span class="product-browse__sku">
          <ng-container *ngIf="p.serialNo">#{{ p.serialNo }} · </ng-container>{{ p.sku }}
        </span>
        <span class="product-browse__stock">Stock {{ p.stock }}</span>
        <span class="product-browse__price">{{ p.price | number:'1.2-2' }}</span>
      </button>
    </div>

    <div class="product-browse__foot">
      <span>↑↓ navigate · Enter select · Esc close</span>
      <span>{{ filteredProducts.length }} of {{ products.length }}</span>
    </div>
  </div>
</div>
