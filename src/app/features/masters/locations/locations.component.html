<div class="page-shell" appPageNewShortcut [pageNewShortcutActive]="!saving" (pageNewShortcut)="openCreate()">
  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <ng-container *ngIf="!showForm">
    <div class="page-header">
      <h4>Store Locations</h4>
      <button class="btn btn-primary" (click)="openCreate()" [disabled]="loading">+ Add Location</button>
    </div>

    <div class="content-panel">
      <div class="toolbar">
        <input class="form-control" placeholder="Search..." [(ngModel)]="search" (keyup.enter)="onSearch()" />
        <button class="btn btn-outline-secondary" (click)="onSearch()" [disabled]="loading">Search</button>
      </div>

      <div *ngIf="loading" class="loading-row">Loading...</div>
      <div class="data-table-wrap" *ngIf="!loading">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Default</th><th>Status</th><th class="col-actions">Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngIf="items.length === 0" class="empty-row"><td colspan="4">No locations found.</td></tr>
            <tr *ngFor="let item of items">
              <td>{{ item.locationName }}</td>
              <td>{{ item.isDefault ? 'Yes' : '—' }}</td>
              <td>
                <span class="badge" [class.text-bg-success]="item.isActive" [class.text-bg-secondary]="!item.isActive">
                  {{ item.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td class="col-actions">
                <app-action-icon-button class="me-1" icon="edit" label="Edit location" (activated)="openEdit(item)" />
                <app-action-icon-button icon="delete" variant="danger" label="Delete location" (activated)="remove(item)" />
              </td>
            </tr>
          </tbody>
        </table>
        <app-list-pagination
          [pagination]="pagination"
          [loading]="loading"
          (pageChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)">
        </app-list-pagination>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="showForm">
    <div class="page-header">
      <div class="page-header-left">
        <button type="button" class="btn-back" (click)="cancel()" [disabled]="saving">← Back</button>
        <h4>{{ editingId ? 'Edit Location' : 'Add Location' }}</h4>
      </div>
    </div>

    <div class="form-panel">
      <form [formGroup]="form" (ngSubmit)="save()" appSaveShortcut [saveShortcutActive]="!saving" (saveShortcut)="save()">
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">Location Name *</label>
            <input class="form-control" formControlName="locationName" />
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" formControlName="isDefault" id="locDefault" />
              <label class="form-check-label" for="locDefault">Default store</label>
            </div>
          </div>
          <div class="col-md-3 d-flex align-items-end" *ngIf="editingId">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" formControlName="isActive" id="locActive" />
              <label class="form-check-label" for="locActive">Active</label>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-success" type="submit" [disabled]="saving">{{ saving ? 'Saving...' : 'Save' }}</button>
          <button class="btn btn-secondary" type="button" (click)="cancel()" [disabled]="saving">Cancel</button>
        </div>
      </form>
    </div>
  </ng-container>
</div>
