<div class="page-shell" appPageNewShortcut [pageNewShortcutActive]="!saving" (pageNewShortcut)="openCreate()">
  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <ng-container *ngIf="!showForm">
    <div class="page-header">
      <h4>Customers</h4>
      <button class="btn btn-primary" (click)="openCreate()" [disabled]="loading">+ Add Customer</button>
    </div>

    <div class="content-panel">
      <div class="toolbar">
        <input class="form-control" placeholder="Search..." [(ngModel)]="search" (keyup.enter)="onSearch()" />
        <button class="btn btn-outline-secondary" (click)="onSearch()" [disabled]="loading">Search</button>
      </div>

      <div *ngIf="loading" class="loading-row">Loading...</div>
      <div class="data-table-wrap" *ngIf="!loading">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Phone</th><th>Balance</th><th class="col-actions">Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngIf="items.length === 0" class="empty-row"><td colspan="4">No customers found.</td></tr>
            <tr *ngFor="let item of items">
              <td>{{ item.customerName }}</td>
              <td>{{ item.phone }}</td>
              <td>{{ item.currentBalance | number:'1.2-2' }}</td>
              <td class="col-actions">
                <button class="btn btn-sm btn-outline-primary me-1" (click)="openEdit(item)">Edit</button>
                <button class="btn btn-sm btn-outline-danger" (click)="remove(item)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
        <app-list-pagination
          [pagination]="pagination"
          [loading]="loading"
          (pageChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)">
        </app-list-pagination>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="showForm">
    <div class="page-header">
      <div class="page-header-left">
        <button type="button" class="btn-back" (click)="cancel()" [disabled]="saving">← Back</button>
        <h4>{{ editingId ? 'Edit Customer' : 'Add Customer' }}</h4>
      </div>
    </div>

    <div class="form-panel">
      <form [formGroup]="form" (ngSubmit)="save()" appSaveShortcut [saveShortcutActive]="!saving" (saveShortcut)="save()">
        <div class="row g-2">
          <div class="col-md-4">
            <label class="form-label">Name *</label>
            <input class="form-control" formControlName="customerName" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Phone</label>
            <input class="form-control" formControlName="phone" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Email</label>
            <input class="form-control" formControlName="email" />
          </div>
          <div class="col-md-8">
            <label class="form-label">Address</label>
            <input class="form-control" formControlName="address" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Opening Balance</label>
            <input type="number" class="form-control" formControlName="openingBalance" />
            <small class="text-muted">Old debt before using this system — added to total balance</small>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-success" type="submit" [disabled]="saving">{{ saving ? 'Saving...' : 'Save' }}</button>
          <button class="btn btn-secondary" type="button" (click)="cancel()" [disabled]="saving">Cancel</button>
        </div>
      </form>
    </div>
  </ng-container>
</div>
