<button
  *ngIf="!isLink"
  type="button"
  [class]="buttonClass"
  [disabled]="disabled"
  [attr.tabindex]="tabIndex"
  [title]="label"
  [attr.aria-label]="label"
  (click)="activate()">
  <ng-container *ngTemplateOutlet="iconTemplate" />
  <span class="visually-hidden">{{ label }}</span>
</button>

<a
  *ngIf="isLink"
  [class]="buttonClass"
  [routerLink]="routerLink"
  [queryParams]="queryParams"
  [attr.tabindex]="tabIndex"
  [title]="label"
  [attr.aria-label]="label">
  <ng-container *ngTemplateOutlet="iconTemplate" />
  <span class="visually-hidden">{{ label }}</span>
</a>

<ng-template #iconTemplate>
  <svg *ngIf="icon === 'view'" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>

  <svg *ngIf="icon === 'edit'" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M4 20h4L19 9a2.1 2.1 0 0 0-3-3L5 17l-1 3Z"/>
    <path d="m14.5 7.5 3 3M13 20H4"/>
  </svg>

  <svg *ngIf="icon === 'delete'" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M4 7h16"/>
    <path d="M9 7V4h6v3"/>
    <path d="m6.5 7 1 13h9l1-13"/>
    <path d="M10 11v5M14 11v5"/>
  </svg>

  <svg *ngIf="icon === 'print'" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M7 9V3h10v6"/>
    <path d="M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/>
    <path d="M7 14h10v7H7z"/>
  </svg>

  <svg *ngIf="icon === 'share'" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="18" cy="5" r="2.5"/>
    <circle cx="6" cy="12" r="2.5"/>
    <circle cx="18" cy="19" r="2.5"/>
    <path d="M8.4 13.2 15.6 17.3M15.6 6.7 8.4 10.8"/>
  </svg>

  <svg *ngIf="icon === 'pdf'" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/>
    <path d="M14 3v5h5"/>
    <path d="M8.5 16.5h2.2c1.1 0 1.8-.6 1.8-1.5s-.7-1.5-1.8-1.5H8.5v3Zm0-3h2c.5 0 .8.2.8.7s-.3.7-.8.7H8.5v-1.4ZM13.2 16.5h1.1c1.4 0 2.3-.8 2.3-2.1s-.9-2.1-2.3-2.1h-1.1v4.2Zm1.1-3.2c.8 0 1.2.4 1.2 1.1s-.4 1.1-1.2 1.1h-.1v-2.2Z"/>
  </svg>

  <svg *ngIf="icon === 'remove'" viewBox="0 0 24 24" aria-hidden="true">
    <path d="m6 6 12 12M18 6 6 18"/>
  </svg>

</ng-template>
